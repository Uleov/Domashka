{% extends 'articles/base.html' %}
{% block title %}{{ article.title }}{% endblock %}
{% block content %}
<article>
    <h1>{{ article.title }}</h1>
    <p>{{ article.created_at|date:"d.m.Y" }} | {{ article.category.name }}</p>
    <div>{{ article.content|linebreaks }}</div>
    <p><a href="{% url 'article_edit' article.slug %}">Редактировать</a></p>
    <p><a href="{% url 'article_list' %}">К списку статей</a></p>
</article>
{% endblock %}
